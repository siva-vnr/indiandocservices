<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 540" fill="none">
  <defs>
    <!-- Teal marble background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3A8870"/>
      <stop offset="50%" stop-color="#1E5C4A"/>
      <stop offset="100%" stop-color="#123830"/>
    </linearGradient>
    <radialGradient id="bgSpot" cx="55%" cy="38%" r="52%">
      <stop offset="0%" stop-color="#4E9E88" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#123830" stop-opacity="0"/>
    </radialGradient>

    <!-- Bronze palette -->
    <linearGradient id="brnMain" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#D4A040"/>
      <stop offset="35%" stop-color="#9A6418"/>
      <stop offset="70%" stop-color="#6A3E0C"/>
      <stop offset="100%" stop-color="#3C2008"/>
    </linearGradient>
    <linearGradient id="brnLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ECC858"/>
      <stop offset="60%" stop-color="#B87C28"/>
      <stop offset="100%" stop-color="#7A4E10"/>
    </linearGradient>
    <radialGradient id="brnSkin" cx="38%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#CCA040"/>
      <stop offset="55%" stop-color="#8B5C14"/>
      <stop offset="100%" stop-color="#5A3808"/>
    </radialGradient>
    <linearGradient id="goldMetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0D060"/>
      <stop offset="40%" stop-color="#D4A030"/>
      <stop offset="100%" stop-color="#8A5C10"/>
    </linearGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="drop" x="-20%" y="-10%" width="150%" height="140%">
      <feDropShadow dx="-4" dy="6" stdDeviation="10" flood-color="#081C12" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- ══ BACKGROUND ══ -->
  <rect width="320" height="540" fill="url(#bg)"/>
  <rect width="320" height="540" fill="url(#bgSpot)"/>

  <!-- Marble column suggestions -->
  <rect x="18" y="0" width="38" height="440" rx="6" fill="#2A7060" opacity="0.22"/>
  <rect x="264" y="0" width="38" height="440" rx="6" fill="#2A7060" opacity="0.22"/>
  <line x1="18" y1="0" x2="18" y2="440" stroke="#4A9882" stroke-width="0.6" opacity="0.2"/>
  <line x1="56" y1="0" x2="56" y2="440" stroke="#4A9882" stroke-width="0.6" opacity="0.2"/>
  <line x1="264" y1="0" x2="264" y2="440" stroke="#4A9882" stroke-width="0.6" opacity="0.2"/>
  <line x1="302" y1="0" x2="302" y2="440" stroke="#4A9882" stroke-width="0.6" opacity="0.2"/>

  <!-- Marble veins -->
  <path d="M22 60 Q58 110 44 190 Q30 270 72 350 Q94 400 80 450" stroke="#5AA890" stroke-width="0.7" fill="none" opacity="0.18"/>
  <path d="M278 30 Q248 100 262 180 Q276 260 244 340" stroke="#5AA890" stroke-width="0.5" fill="none" opacity="0.14"/>
  <path d="M0 180 Q90 168 150 182 Q210 196 320 176" stroke="#4A9878" stroke-width="0.5" fill="none" opacity="0.1"/>
  <path d="M0 320 Q100 308 160 322 Q220 336 320 316" stroke="#4A9878" stroke-width="0.4" fill="none" opacity="0.1"/>

  <!-- Copper ring accent -->
  <path d="M-20 534 Q160 468 340 534" stroke="#C4863A" stroke-width="2.5" fill="none" opacity="0.45"/>

  <!-- ══ STATUE (all with drop shadow) ══ -->
  <g filter="url(#drop)">

  <!-- ── ROBES – lower flowing body ── -->
  <path d="
    M138 248 Q116 272 100 315
    Q82 362 74 408 Q66 450 70 485
    Q90 498 130 502 Q160 505 160 505
    Q160 505 190 502 Q230 498 250 485
    Q254 450 246 408 Q238 362 220 315
    Q204 272 182 248 Z
  " fill="url(#brnMain)"/>

  <!-- Robe fold highlights -->
  <path d="M144 252 Q128 280 116 325 Q104 372 100 415 Q97 448 102 480" stroke="#C8901E" stroke-width="2" fill="none" opacity="0.45" stroke-linecap="round"/>
  <path d="M160 252 Q158 310 158 375 Q158 428 161 480" stroke="#D4A030" stroke-width="1.5" fill="none" opacity="0.35" stroke-linecap="round"/>
  <path d="M176 252 Q192 280 204 325 Q216 372 220 415 Q223 448 218 480" stroke="#C8901E" stroke-width="2" fill="none" opacity="0.45" stroke-linecap="round"/>

  <!-- Robe shadows inner left/right -->
  <path d="M95 340 Q88 390 90 440" stroke="#3C2008" stroke-width="8" fill="none" opacity="0.25" stroke-linecap="round"/>
  <path d="M225 340 Q232 390 230 440" stroke="#3C2008" stroke-width="8" fill="none" opacity="0.25" stroke-linecap="round"/>

  <!-- Hem band -->
  <path d="M72 483 Q120 492 160 494 Q200 492 248 483" stroke="#D4A030" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M74 487 Q122 496 160 498 Q198 496 246 487" stroke="#D4A030" stroke-width="0.8" fill="none" opacity="0.35"/>

  <!-- ── UPPER ROBE / TORSO DRAPE ── -->
  <!-- Right shoulder / chest robe -->
  <path d="
    M192 148 Q212 162 220 185
    Q226 208 220 232 Q212 248 194 254
    Q178 258 162 256 L160 252
    L160 248 Q180 246 190 238
    Q202 226 202 205 Q200 182 190 162 Z
  " fill="url(#brnMain)" opacity="0.92"/>

  <!-- Left shoulder toga drape -->
  <path d="
    M128 148 Q110 160 102 182
    Q96 204 98 228 Q100 244 114 252
    Q128 258 144 256 Q156 254 160 252
    L160 248 Q146 246 134 240
    Q120 230 118 210 Q116 188 124 165 Z
  " fill="#7A4E10" opacity="0.75"/>

  <!-- Robe clasp/pin on right shoulder -->
  <circle cx="190" cy="154" r="5" fill="url(#goldMetal)" filter="url(#glow)"/>
  <circle cx="190" cy="154" r="3" fill="#F0D060" opacity="0.7"/>

  <!-- Belt / sash -->
  <path d="M108 242 Q132 250 160 252 Q188 250 212 242" stroke="url(#goldMetal)" stroke-width="4.5" fill="none" stroke-linecap="round" opacity="0.85"/>
  <path d="M110 246 Q134 253 160 255 Q186 253 210 246" stroke="#F0D060" stroke-width="1" fill="none" opacity="0.35"/>

  <!-- ── TORSO ── -->
  <path d="
    M130 148 Q124 168 122 195
    Q120 220 122 240 Q136 250 160 252
    Q184 250 198 240 Q200 220 198 195
    Q196 168 190 148 Z
  " fill="url(#brnMain)" opacity="0.88"/>
  <!-- Torso highlight -->
  <path d="M136 155 Q129 175 127 198 Q125 222 128 238" stroke="#C8901E" stroke-width="3" fill="none" opacity="0.35" stroke-linecap="round"/>

  <!-- ── NECK ── -->
  <path d="
    M152 110 Q148 120 148 134
    Q148 144 160 147 Q172 144 172 134
    Q172 120 168 110 Z
  " fill="url(#brnSkin)"/>

  <!-- ══ LEFT ARM — RAISED HIGH ══ -->
  <!-- Upper arm going UP-LEFT -->
  <path d="M130 155 Q112 142 94 120 Q78 102 62 82"
        stroke="#8A5C14" stroke-width="16" stroke-linecap="round" fill="none"/>
  <path d="M129 152 Q111 139 93 117 Q77 99 61 79"
        stroke="#C8901E" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M132 159 Q114 146 97 124 Q81 106 65 86"
        stroke="#3C2008" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.3"/>

  <!-- Forearm -->
  <path d="M62 82 Q52 66 44 50"
        stroke="#8A5C14" stroke-width="12" stroke-linecap="round" fill="none"/>
  <path d="M61 79 Q51 63 43 47"
        stroke="#C8901E" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.45"/>

  <!-- Hand holding rod -->
  <ellipse cx="42" cy="47" rx="9" ry="6" fill="#7A4E10" transform="rotate(-25 42 47)"/>
  <ellipse cx="41" cy="46" rx="5" ry="3.5" fill="#C8901E" transform="rotate(-25 41 46)" opacity="0.45"/>

  <!-- ── SCALES OF JUSTICE (raised high) ── -->
  <!-- Vertical rod -->
  <line x1="42" y1="44" x2="42" y2="4" stroke="url(#goldMetal)" stroke-width="2.8" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Top finial -->
  <circle cx="42" cy="3" r="6" fill="url(#goldMetal)" filter="url(#glow)"/>
  <circle cx="42" cy="3" r="3.5" fill="#F0D060"/>
  <circle cx="42" cy="3" r="1.5" fill="white" opacity="0.45"/>

  <!-- Main beam -->
  <line x1="6" y1="12" x2="78" y2="12" stroke="url(#goldMetal)" stroke-width="2.4" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="42" cy="12" r="3.5" fill="#F0D060" filter="url(#glow)"/>

  <!-- Left pan chains (chain links) -->
  <line x1="10" y1="12" x2="7" y2="19" stroke="#D4A030" stroke-width="1.3"/>
  <line x1="7" y1="19" x2="10" y2="24" stroke="#D4A030" stroke-width="1.3"/>
  <line x1="10" y1="24" x2="7" y2="30" stroke="#D4A030" stroke-width="1.3"/>
  <line x1="22" y1="12" x2="25" y2="19" stroke="#D4A030" stroke-width="1.3"/>
  <line x1="25" y1="19" x2="22" y2="24" stroke="#D4A030" stroke-width="1.3"/>
  <line x1="22" y1="24" x2="25" y2="30" stroke="#D4A030" stroke-width="1.3"/>
  <!-- Left pan -->
  <path d="M4 30 Q16 40 27 30" fill="none" stroke="url(#goldMetal)" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M5 32 Q16 42 26 32" fill="#8A5C14" opacity="0.2"/>

  <!-- Right pan chains (slightly dipped) -->
  <line x1="62" y1="12" x2="59" y2="20" stroke="#D4A030" stroke-width="1.3"/>
  <line x1="59" y1="20" x2="62" y2="26" stroke="#D4A030" stroke-width="1.3"/>
  <line x1="62" y1="26" x2="59" y2="34" stroke="#D4A030" stroke-width="1.3"/>
  <line x1="74" y1="12" x2="77" y2="20" stroke="#D4A030" stroke-width="1.3"/>
  <line x1="77" y1="20" x2="74" y2="26" stroke="#D4A030" stroke-width="1.3"/>
  <line x1="74" y1="26" x2="77" y2="34" stroke="#D4A030" stroke-width="1.3"/>
  <!-- Right pan (slightly lower) -->
  <path d="M56 34 Q68 44 79 34" fill="none" stroke="url(#goldMetal)" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M57 36 Q68 46 78 36" fill="#8A5C14" opacity="0.2"/>

  <!-- ══ RIGHT ARM — LOWERED ══ -->
  <!-- Upper arm going down-right -->
  <path d="M190 155 Q212 168 228 188 Q238 206 244 224"
        stroke="#8A5C14" stroke-width="16" stroke-linecap="round" fill="none"/>
  <path d="M189 152 Q211 165 227 185 Q237 203 243 221"
        stroke="#C8901E" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M192 159 Q214 172 230 192 Q240 210 246 228"
        stroke="#3C2008" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.3"/>

  <!-- Forearm -->
  <path d="M244 224 Q252 244 256 262"
        stroke="#8A5C14" stroke-width="13" stroke-linecap="round" fill="none"/>
  <path d="M243 221 Q251 241 255 259"
        stroke="#C8901E" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.45"/>

  <!-- Hand -->
  <ellipse cx="257" cy="265" rx="8" ry="5.5" fill="#7A4E10"/>
  <ellipse cx="256" cy="264" rx="5" ry="3.5" fill="#C8901E" opacity="0.4"/>

  <!-- ── SWORD (pointing down) ── -->
  <!-- Blade -->
  <path d="M259 268 L276 435 L280 452" stroke="url(#goldMetal)" stroke-width="4.5" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Blade shine -->
  <path d="M258 266 L275 433 L279 450" stroke="#F0D060" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Blade dark edge -->
  <path d="M261 270 L278 437" stroke="#3C2008" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <!-- Sword tip -->
  <path d="M279 451 L286 468 L272 454 Z" fill="url(#goldMetal)" filter="url(#glow)"/>
  <path d="M280 452 L285 466 L274 455 Z" fill="#F0D060" opacity="0.5"/>

  <!-- Cross-guard -->
  <path d="M244 265 Q252 260 266 260 Q278 260 286 267" stroke="url(#goldMetal)" stroke-width="6" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M245 265 Q253 261 267 261 Q279 261 285 267" stroke="#F0D060" stroke-width="2" fill="none" opacity="0.55"/>

  <!-- Grip -->
  <rect x="253" y="267" width="9" height="24" rx="3.5" fill="#5A3808"/>
  <rect x="254" y="268" width="4" height="22" rx="2" fill="#C8901E" opacity="0.35"/>

  <!-- Pommel -->
  <ellipse cx="257" cy="293" rx="8" ry="5.5" fill="url(#goldMetal)" filter="url(#glow)"/>
  <ellipse cx="256" cy="292" rx="4.5" ry="3" fill="#F0D060" opacity="0.6"/>

  <!-- ══ HEAD ══ -->
  <ellipse cx="160" cy="78" rx="25" ry="30" fill="url(#brnSkin)"/>
  <!-- Shadow right side -->
  <path d="M178 66 Q185 78 184 90 Q182 104 174 110" stroke="#3C2008" stroke-width="4" fill="none" opacity="0.28"/>
  <!-- Light highlight left -->
  <ellipse cx="150" cy="72" rx="12" ry="14" fill="#CCA040" opacity="0.25"/>

  <!-- Chin/jaw area -->
  <path d="M147 103 Q148 112 160 115 Q172 112 173 103" fill="url(#brnSkin)" opacity="0.8"/>

  <!-- ══ BLINDFOLD ══ -->
  <path d="M135 72 Q148 67 160 68 Q172 67 185 72 Q187 80 185 86 Q172 90 160 89 Q148 90 135 86 Q133 80 135 72 Z" fill="#163028"/>
  <path d="M136 73 Q160 70 184 73" stroke="#2A6050" stroke-width="0.8" fill="none" opacity="0.4"/>
  <path d="M136 84 Q160 87 184 84" stroke="#2A6050" stroke-width="0.6" fill="none" opacity="0.35"/>
  <!-- Knot -->
  <path d="M185 73 Q200 69 198 79 Q196 90 185 84" fill="#163028" stroke="#C4863A" stroke-width="0.6"/>
  <!-- Ribbon tail -->
  <path d="M198 79 Q202 96 198 114 Q195 126 198 136" stroke="#163028" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M199 80 Q203 97 199 115" stroke="#2A6050" stroke-width="1" stroke-linecap="round" opacity="0.3"/>

  <!-- ══ HAIR UPDO ══ -->
  <ellipse cx="160" cy="52" rx="20" ry="14" fill="#6A4010" opacity="0.88"/>
  <path d="M143 60 Q145 48 160 46 Q175 48 177 60" fill="#8A5C14" opacity="0.5"/>
  <path d="M140 68 Q138 56 144 50 Q150 44 158 48" stroke="#8A5C14" stroke-width="1.5" fill="none" opacity="0.45"/>
  <path d="M180 68 Q182 56 176 50 Q170 44 162 48" stroke="#8A5C14" stroke-width="1.5" fill="none" opacity="0.45"/>

  <!-- ══ LAUREL CROWN ══ -->
  <!-- Left leaves -->
  <path d="M142 58 Q133 47 127 52 Q121 57 133 61" fill="#5A3808" stroke="#D4A030" stroke-width="1.1"/>
  <path d="M148 52 Q140 40 133 44 Q126 48 139 54" fill="#5A3808" stroke="#D4A030" stroke-width="1.1"/>
  <path d="M155 47 Q149 35 141 38 Q133 41 146 48" fill="#6A4810" stroke="#D4A030" stroke-width="1.1"/>
  <!-- Right leaves -->
  <path d="M178 58 Q187 47 193 52 Q199 57 187 61" fill="#5A3808" stroke="#D4A030" stroke-width="1.1"/>
  <path d="M172 52 Q180 40 187 44 Q194 48 181 54" fill="#5A3808" stroke="#D4A030" stroke-width="1.1"/>
  <path d="M165 47 Q171 35 179 38 Q187 41 174 48" fill="#6A4810" stroke="#D4A030" stroke-width="1.1"/>
  <!-- Crown star center -->
  <circle cx="160" cy="44" r="6" fill="url(#goldMetal)" filter="url(#glow)"/>
  <path d="M160 38 L161.8 43 L167 43 L162.8 46.2 L164.5 51.5 L160 48.5 L155.5 51.5 L157.2 46.2 L153 43 L158.2 43 Z" fill="#F0D060"/>
  <!-- Crown band -->
  <path d="M133 60 Q160 65 187 60" stroke="#D4A030" stroke-width="2" fill="none" opacity="0.65"/>

  </g> <!-- end drop shadow group -->

  <!-- ══ PEDESTAL ══ -->
  <rect x="95" y="503" width="130" height="10" rx="3" fill="url(#goldMetal)" opacity="0.8"/>
  <rect x="82" y="511" width="156" height="9" rx="2" fill="#9A6418" opacity="0.75"/>
  <rect x="68" y="518" width="184" height="10" rx="3" fill="#7A4E10" opacity="0.65"/>
  <!-- Pedestal shine -->
  <rect x="96" y="503" width="128" height="3" rx="2" fill="#F0D060" opacity="0.35"/>
  <!-- Pedestal divider line -->
  <line x1="84" y1="514" x2="236" y2="514" stroke="#D4A030" stroke-width="0.6" opacity="0.4"/>

  <!-- Ground shadow -->
  <ellipse cx="160" cy="530" rx="110" ry="10" fill="#061410" opacity="0.35"/>

  <!-- Vignette -->
  <radialGradient id="vig" cx="50%" cy="50%" r="72%">
    <stop offset="58%" stop-color="transparent"/>
    <stop offset="100%" stop-color="#061410" stop-opacity="0.55"/>
  </radialGradient>
  <rect width="320" height="540" fill="url(#vig)"/>
</svg>
